<main id="main-content" class="wt-main">
  <section class="shell-section contact-form-section">
    <div class="shell-block contact-panel--single">
      <h1 class="shell-title">Demande de contact</h1>
      <form action="https://formsubmit.co/cantin.bruno@gmx.fr" method="POST" enctype="multipart/form-data">
        <div class="contact-form-fields">
          <label>
            <span>Type de demande:</span>
            <select name="type_demande" required>
              <option value="">Choisir</option>
              <option value="Question generale">Question generale</option>
              <option value="Demande d'audit">Demande d'audit</option>
              <option value="Support Wave Audit">Support Wave Audit</option>
              <option value="Outils WaveTools">Outils WaveTools</option>
              <option value="Collaboration">Collaboration</option>
            </select>
          </label>
          <label><span>Votre nom:</span><input type="text" name="name" placeholder="Nom" required></label>
          <label><span>Votre prenom:</span><input type="text" name="prenom" placeholder="Prenom"></label>
          <label><span>Votre adresse mail:</span><input type="email" name="email" placeholder="Email" required></label>
          <label><span>Telephone (facultatif):</span><input type="tel" name="telephone" placeholder="06 xx xx xx xx"></label>
          <label><span>Entreprise (facultatif):</span><input type="text" name="entreprise" placeholder="Entreprise"></label>
          <label class="contact-wide"><span>Contexte:</span><input type="text" name="contexte" placeholder="Ex: audit reseau, probleme logiciel, question DNS..."></label>
          <label class="contact-wide"><span>Votre probleme rencontre:</span><textarea name="message" rows="8" placeholder="Message" required></textarea></label>
          <label class="contact-wide"><span>Piece jointe (optionnel):</span><input type="file" name="attachment" accept=".pdf,.png,.jpg,.jpeg,.txt,.log"></label>
          <input type="text" name="_honey" style="display:none">
          <input type="hidden" name="_subject" value="Nouvelle demande WaveTools">
          <input type="hidden" name="_captcha" value="true">
          <input type="hidden" name="_next" value="https://www.wavetools.fr/contact/envoyer.html">
          <button type="submit">Envoyer la demande</button>
        </div>
      </form>
    </div>
  </section>
</main>
