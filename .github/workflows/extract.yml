name: Extract binder specs (manual)

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run extractor
        run: node produits/connecteur/scripts/extract-binder-specs.mjs

      - name: Commit generated JSON
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add produits/connecteur/fiche/*.json produits/connecteur/fiche/index.json || true
          git diff --cached --quiet || git commit -m "chore: generate binder product specs"
          git push
