name: Extract binder specs (manual)

on:
  workflow_dispatch:

# Empêche 2 runs de push en même temps
concurrency:
  group: binder-extract-main
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  extract:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # IMPORTANT pour git pull --rebase
          fetch-depth: 0

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run extractor
        run: node produits/connecteur/scripts/extract-binder-specs.mjs
        env:
          DELAY_MS: "120"

          # ⭐ Pour tester seulement 20 produits :
          # MAX_PRODUCTS: "20"

      - name: Commit & push generated catalog
        run: |
          set -e

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # ajoute JSON + images
          git add produits/connecteur/fiche/*.json \
                  produits/connecteur/fiche/index.json \
                  produits/connecteur/img/* || true

          # rien changé ?
          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi

          git commit -m "auto: update binder catalog"

          # 🔥 solution stable anti conflit
          git pull --rebase --autostash origin main

          git push origin main