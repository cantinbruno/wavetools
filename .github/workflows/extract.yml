name: Extract binder specs (manual)

on:
  workflow_dispatch:

concurrency:
  group: binder-extract-main
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run extractor
        run: node produits/connecteur/scripts/extract-binder-specs.mjs
        # env:
        #   DELAY_MS: "120"
        #   MAX_PRODUCTS: "20"

      - name: Commit changes (local)
        run: |
          set -e

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # Ajouts/modifs/suppressions
          git add -A produits/connecteur/fiche produits/connecteur/img

          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi

          git commit -m "auto: update binder catalog"

      - name: Create Pull Request
        if: success()
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: bot/binder-catalog
          base: main
          delete-branch: true
          title: "auto: update binder catalog"
          body: |
            Mise à jour automatique du catalogue Binder (JSON + images).
            Généré via GitHub Actions.
          commit-message: "auto: update binder catalog"