name: Extract binder specs (manual)

on:
  workflow_dispatch:

concurrency:
  group: binder-extract-main
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run extractor
        run: node produits/connecteur/scripts/extract-binder-specs.mjs
        env:
          # DELAY_MS: "120"
          MAX_PRODUCTS: "20"

      - name: Commit & push generated catalog
        run: |
          set -e

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # ✅ JSON + IMG (ajouts/modifs/suppressions)
          git add -A produits/connecteur/fiche produits/connecteur/img

          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi

          git commit -m "auto: update binder catalog"

          git pull --rebase --autostash origin main
          git push origin main