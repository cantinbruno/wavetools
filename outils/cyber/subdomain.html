<script>

const $ = id => document.getElementById(id);

function setTxt(id,v){
$(id).textContent = v || "—";
}

function setVal(id,v){
$(id).value = v || "";
}

function logLine(message){
const now = new Date();
const stamp = now.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
const log = $("log");
log.value += "["+stamp+"] "+message+"\n";
log.scrollTop = log.scrollHeight;
}

function normalizeDomain(d){

d = (d||"")
.trim()
.toLowerCase()
.replace(/^https:\/\//,"")
.replace(/\/.*$/,"")
.replace(/\.+$/,"");

if(!d.includes(".")) throw "Domaine invalide";

return d;

}

function uniq(arr){

return [...new Set(arr)];

}

function clean(name,domain){

let n = name
.trim()
.toLowerCase();

if(!n) return "";

n = n.replace(/\s+/g,"");


// wildcard toujours nettoyé
if(n.startsWith("*.")){

n = n.substring(2);

}

if(n===domain) return n;

if(n.endsWith("."+domain))
return n;

return "";

}


async function scan(){

const scanBtn = $("scan");
scanBtn.disabled = true;

setTxt("status","Scan...");
setTxt("note","Récupération CT logs crt.sh");

setVal("out","");
setVal("log","");
logLine("Démarrage du scan.");

let domain;

try{

domain = normalizeDomain(
$("domain").value
);
logLine("Domaine validé : "+domain);

}catch(e){

setTxt("status","Erreur");
setTxt("note","Domaine invalide");
logLine("Erreur : domaine invalide.");
scanBtn.disabled = false;

return;

}

try{

// Domaine EXACT demandé
const url =
"https://crt.sh/q="
+encodeURIComponent(domain)
+"&output=json";

logLine("Interrogation de crt.sh...");
const r = await fetch(url,{cache:"no-store"});

if(!r.ok)
throw "crt.sh indisponible";

logLine("Réponse reçue : HTTP "+r.status+".");
const txt = await r.text();
logLine("Volume reçu : "+txt.length+" caractères.");

let data;

try{

logLine("Analyse de la réponse JSON...");
data = JSON.parse(txt);
logLine(data.length+" entrée(s) de certificat ? traiter.");

}catch{

throw "crt.sh a renvoyé une réponse invalide (réessaie).";

}

const subs = [];
let scannedNames = 0;

for(const it of data){

const nv =
(it && it.name_value)
 String(it.name_value)
:"";

for(const line of nv.split("\n")){

scannedNames++;
const c = clean(line,domain);

if(c)
subs.push(c);

}

}

logLine(scannedNames+" nom(s) brut(s) analysé(s).");
logLine(subs.length+" correspondance(s) avant dédoublonnage.");
const result =
uniq(subs)
.sort((a,b)=>a.localeCompare(b));
logLine(result.length+" sous-domaine(s) unique(s) après tri.");

if(!result.length){

setTxt("status","OK");
setTxt("note","Aucun sous-domaine trouvé.");

setVal("out","(vide)");
logLine("Terminé : aucun résultat.");

return;

}

setVal(
"out",
result.join("\n")
);

setTxt("status","OK");

setTxt(
"note",
result.length+" sous-domaines trouvés via CT logs."
);
logLine("Terminé avec succès.");

}catch(e){

setTxt("status","Erreur");

setTxt(
"note",
typeof e==="string"
e
:"Impossible d'interroger crt.sh (CORS ou charge)."
);
logLine("Erreur : "+(typeof e==="string" ? e : "impossible d'interroger crt.sh."));

}finally{

scanBtn.disabled = false;

}

}

$("scan").onclick=scan;

$("clear").onclick=()=>{

setVal("domain","");
setVal("out","");
setVal("log","");

setTxt("status","—");
setTxt("note","—");

};

$("copy").onclick=()=>{

navigator.clipboard.writeText(
$("out").value||""
);

};

  </script>
