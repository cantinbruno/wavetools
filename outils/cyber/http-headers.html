<main class="tool-main">
  <section class="shell-section">
    <div class="ip-card">
      <h1 class="tool-title">Server Fingerprint (sans backend)</h1>

      <div class="terminal-body">
        <div class="line">URL cible :</div>
        <div class="line">
          <input id="url" style="width:100%" placeholder="https://example.com" />
        </div>

        <div class="line">
          Note : <span id="noteHint">Sans backend, la lecture des headers est souvent bloquée par CORS. Si ça bloque, colle les headers + un extrait HTML ci-dessous.</span>
        </div>

        <div class="line">Headers HTTP (optionnel) :</div>
        <div class="line">
          <textarea id="headersInput" rows="8" style="width:100%"
            placeholder="Colle ici des headers (ex: depuis curl -I https://site)\n\nHTTP/2 200\nserver: nginx\nx-powered-by: PHP/8.2\n..."></textarea>
        </div>

        <div class="line">HTML source (optionnel) :</div>
        <div class="line">
          <textarea id="htmlInput" rows="8" style="width:100%"
            placeholder="Optionnel : colle le HTML (Ctrl+U) si tu veux une détection plus précise (CMS/frameworks/CDN)."></textarea>
        </div>

        <button class="copy-btn" id="btnProbe">Analyser</button>
        <button class="copy-btn" id="btnClear">Vider</button>

        <div class="line">Résultat :</div>
        <div class="line">
          <textarea id="out" rows="14" style="width:100%" readonly></textarea>
        </div>

        <div class="line">Statut : <span id="status">—</span></div>
        <div class="line">Note : <span id="note">—</span></div>
      </div>

      <button class="copy-btn" id="copyOut">Copier résultat</button>
    </div>
  </section>

<script>
 const $ = (id) => document.getElementById(id);
  function setTxt(id, v) { $(id).textContent = (v===undefined||v===null||v==="") ? "—" : v; }
  function setVal(id, v) { $(id).value = v || ""; }

  function normalizeUrl(u){
    u = (u||"").trim();
    if (!u) throw new Error("URL vide.");
    if (!/^https?:\/\//i.test(u)) u = "https://" + u;
    u = u.replace(/#.*$/, "");
    return u;
  }

  function parseHeadersBlock(text){
    // Supporte : "Header: value" et blocs curl -I incluant "HTTP/1.1 200"
    const map = new Map();
    const lines = (text || "").split(/\r?\n/);
    for (const lineRaw of lines){
      const line = lineRaw.trim();
      if (!line) continue;
      if (/^http\/\d|^http\/2|^HTTP\/\d/i.test(line)) {
        map.set(":status-line", line);
        continue;
      }
      const idx = line.indexOf(":");
      if (idx <= 0) continue;
      const k = line.slice(0, idx).trim().toLowerCase();
      const v = line.slice(idx + 1).trim();
      if (!k) continue;
      // multi-valued headers
      if (map.has(k)) map.set(k, map.get(k) + " | " + v);
      else map.set(k, v);
    }
    return map;
  }

  function header(map, name){
    return map.get(name.toLowerCase()) || "";
  }

  function pushLine(arr, k, v){
    if (v === undefined || v === null || String(v).trim() === "") return;
    arr.push(`${k}: ${v}`);
  }

  function detectFromHeaders(h){
    const out = {
      server: header(h, "server"),
      poweredBy: header(h, "x-powered-by"),
      via: header(h, "via"),
      cache: header(h, "x-cache") || header(h, "cf-cache-status") || header(h, "x-varnish"),
      cdn: [],
      reverseProxy: [],
      waf: [],
      tech: [],
      security: [],
      cookies: header(h, "set-cookie"),
      statusLine: header(h, ":status-line"),
    };

    const server = out.server.toLowerCase();
    const powered = out.poweredBy.toLowerCase();
    const via = out.via.toLowerCase();
    const all = Array.from(h.entries()).map(([k,v]) => `${k}: ${v}`).join("\n").toLowerCase();

    // CDN / Proxy hints
    if (all.includes("cf-ray") || all.includes("cloudflare") || all.includes("cf-cache-status")) out.cdn.push("Cloudflare");
    if (all.includes("akamai") || all.includes("akamai-") || all.includes("x-akamai")) out.cdn.push("Akamai");
    if (all.includes("fastly") || all.includes("x-served-by") && all.includes("fastly")) out.cdn.push("Fastly");
    if (all.includes("cloudfront") || all.includes("x-amz-cf-id") || all.includes("via: 1.1") && all.includes("cloudfront")) out.cdn.push("AWS CloudFront");

    // Reverse proxy / load balancer
    if (server.includes("nginx")) out.reverseProxy.push("nginx");
    if (server.includes("apache")) out.reverseProxy.push("Apache");
    if (server.includes("caddy")) out.reverseProxy.push("Caddy");
    if (server.includes("cloudflare")) out.reverseProxy.push("Cloudflare edge");
    if (all.includes("x-envoy") || all.includes("envoy")) out.reverseProxy.push("Envoy");
    if (all.includes("traefik")) out.reverseProxy.push("Traefik");
    if (all.includes("haproxy")) out.reverseProxy.push("HAProxy");
    if (all.includes("istio")) out.reverseProxy.push("Istio");

    // WAF hints (très heuristique)
    if (all.includes("cf-ray") && all.includes("cloudflare")) out.waf.push("Cloudflare (WAF possible)");
    if (all.includes("x-sucuri-id") || all.includes("sucuri")) out.waf.push("Sucuri");
    if (all.includes("x-ww") || all.includes("wordfence")) out.waf.push("Wordfence (WP)");
    if (all.includes("x-cdn") && all.includes("imperva")) out.waf.push("Imperva (possible)");

    // Tech hints
    if (powered.includes("php")) out.tech.push("PHP");
    if (powered.includes("asp.net")) out.tech.push("ASP.NET");
    if (powered.includes("express")) out.tech.push("Node/Express");
    if (server.includes("openresty")) out.tech.push("OpenResty (nginx + Lua)");
    if (server.includes("gunicorn")) out.tech.push("Python/Gunicorn");
    if (server.includes("uvicorn")) out.tech.push("Python/Uvicorn");
    if (server.includes("cowboy")) out.tech.push("Erlang/Cowboy");

    // Security headers present/missing (simple)
    const sec = [];
    const has = (n) => h.has(n.toLowerCase());

    if (has("strict-transport-security")) sec.push("HSTS: oui");
    else sec.push("HSTS: non");
    if (has("content-security-policy")) sec.push("CSP: oui");
    else sec.push("CSP: non");
    if (has("x-frame-options") || has("content-security-policy")) sec.push("Anti-clickjacking: probable");
    else sec.push("Anti-clickjacking: non détecté");
    if (has("x-content-type-options")) sec.push("X-Content-Type-Options: oui");
    else sec.push("X-Content-Type-Options: non");
    if (has("referrer-policy")) sec.push("Referrer-Policy: oui");
    else sec.push("Referrer-Policy: non");
    if (has("permissions-policy")) sec.push("Permissions-Policy: oui");
    else sec.push("Permissions-Policy: non");
    out.security = sec;

    // Clean lists
    out.cdn = Array.from(new Set(out.cdn));
    out.reverseProxy = Array.from(new Set(out.reverseProxy));
    out.waf = Array.from(new Set(out.waf));
    out.tech = Array.from(new Set(out.tech));

    return out;
  }

  function detectFromHtml(html){
    const low = (html || "").toLowerCase();
    const hits = [];
    const add = (k, v) => hits.push(`${k}: ${v}`);

    // CMS hints
    if (low.includes("wp-content/") || low.includes("wp-includes/")) add("CMS", "WordPress (indices wp-content/wp-includes)");
    if (low.includes("content=\"joomla") || low.includes("/media/system/") || low.includes("/media/jui/")) add("CMS", "Joomla (indices media/system)");
    if (low.includes("data-drupal-selector") || low.includes("/sites/default/") || low.includes("/core/misc/drupal.js")) add("CMS", "Drupal (indices drupal)");
    if (low.includes("cdn.shopify.com")) add("CMS", "Shopify (cdn.shopify.com)");
    if (low.includes("prestashop") || (low.includes("/modules/") && low.includes("/themes/"))) add("CMS", "PrestaShop (modules/themes)");
    if (low.includes("magento") || (low.includes("requirejs-config.js") && low.includes("mage/"))) add("CMS", "Magento (mage/ + requirejs)");

    // Framework hints
    if (low.includes("/_next/") || low.includes("__next_data__")) add("Framework", "Next.js");
    if (low.includes("/_nuxt/") || low.includes("__nuxt")) add("Framework", "Nuxt");
    if (low.includes("id=\"gatsby-focus-wrapper\"") || low.includes("gatsby")) add("Framework", "Gatsby (indices)");

    // CDN hints
    if (low.includes("cloudflare")) add("CDN", "Cloudflare (motif dans HTML)");
    if (low.includes("akamai") || low.includes("edgesuite")) add("CDN", "Akamai (motif)");
    if (low.includes("fastly")) add("CDN", "Fastly (motif)");

    // generator meta
    const gen = (html.match(/<meta[^>]+name=["']generator["'][^>]+content=["']([^"']+)["'][^>]*>/i) || [])[1];
    if (gen) add("Meta generator", gen.trim());

    return hits;
  }

  async function tryFetchHeaders(url){
    // Sans backend, CORS peut bloquer :
    // - si CORS OK : on peut lire certains headers
    // - sinon : exception -> on demandera collage manual
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), 8000);
    try{
      const r = await fetch(url, { method: "GET", mode: "cors", cache: "no-store", credentials: "omit", signal: ctrl.signal });
      const h = new Map();
      // Status line (approx)
      h.set(":status-line", `HTTP ${r.status} ${r.statusText || ""}`.trim());
      // Certains headers peuvent être masqués par le navigateur (CORS expose-headers)
      r.headers.forEach((v,k)=>h.set(k.toLowerCase(), v));
      // HTML pour indices (optionnel)
      let text = "";
      try { text = await r.text(); } catch {}
      return { headersMap: h, html: text, corsOk: true };
    } finally {
      clearTimeout(t);
    }
  }

  async function run(){
    setTxt("status","Analyse...");
    setTxt("note","Sans backend : si CORS bloque, colle les headers (curl -I) et/ou le HTML (Ctrl+U).");
    setVal("out","");

    let url;
    try{
      url = normalizeUrl($("url").value);
    }catch(e){
      setTxt("status","Erreur");
      setTxt("note", e.message || "URL invalide.");
      return;
    }

    // 1) Source headers/html : soit fetch (si possible), soit champs collés
    let headersMap = parseHeadersBlock($("headersInput").value);
    let html = ($("htmlInput").value || "").trim();
    let usedFetch = false;

    if (headersMap.size === 0 && !html){
      try{
        const fetched = await tryFetchHeaders(url);
        headersMap = fetched.headersMap;
        html = fetched.html || "";
        usedFetch = true;
      }catch(e){
        setTxt("status","Action requise");
        setTxt("note","CORS bloque la lecture. Colle les headers (curl -I) et/ou le HTML (Ctrl+U), puis relance.");
        return;
      }
    }

    const hRes = detectFromHeaders(headersMap);
    const htmlHits = html ? detectFromHtml(html) : [];

    const lines = [];
    lines.push("Server Fingerprint");
    lines.push("==================");
    lines.push("");

    pushLine(lines, "URL", url);
    pushLine(lines, "Source", usedFetch ? "fetch (CORS OK)" : "collage manuel");

    if (hRes.statusLine) pushLine(lines, "HTTP", hRes.statusLine);
    if (hRes.server) pushLine(lines, "Server", hRes.server);
    if (hRes.poweredBy) pushLine(lines, "X-Powered-By", hRes.poweredBy);
    if (hRes.via) pushLine(lines, "Via", hRes.via);
    if (hRes.cache) pushLine(lines, "Cache/CDN header", hRes.cache);

    if (hRes.cdn.length) pushLine(lines, "CDN probable", hRes.cdn.join(", "));
    if (hRes.reverseProxy.length) pushLine(lines, "Reverse-proxy/LB", hRes.reverseProxy.join(", "));
    if (hRes.waf.length) pushLine(lines, "WAF possible", hRes.waf.join(", "));
    if (hRes.tech.length) pushLine(lines, "Technos probables", hRes.tech.join(", "));

    lines.push("");
    lines.push("Sécurité (headers)");
    lines.push("------------------");
    for (const s of hRes.security) lines.push("- " + s);

    if (hRes.cookies){
      lines.push("");
      lines.push("Cookies (Set-Cookie) — aperçu");
      lines.push("------------------------------");
      // limite taille
      lines.push(hRes.cookies.slice(0, 800) + (hRes.cookies.length > 800 ? "…" : ""));
    }

    if (htmlHits.length){
      lines.push("");
      lines.push("Indices HTML");
      lines.push("------------");
      for (const it of htmlHits.slice(0, 30)) lines.push("- " + it);
    } else {
      lines.push("");
      lines.push("Indices HTML");
      lines.push("------------");
      lines.push("(Aucun HTML fourni/lu)");
    }

    lines.push("");
    lines.push("Aide (sans backend)");
    lines.push("-------------------");
    lines.push("Si CORS bloque :");
    lines.push("1) Récupère les headers : `curl -I https://site` puis colle ici.");
    lines.push("2) Récupère le HTML : ouvre le site -> Ctrl+U -> copie/colle.");

    setVal("out", lines.join("\n"));
    setTxt("status","OK");
  }

  $("btnProbe").addEventListener("click", run);
  $("btnClear").addEventListener("click", () => {
    setVal("url","");
    setVal("headersInput","");
    setVal("htmlInput","");
    setVal("out","");
    setTxt("status","—");
    setTxt("note","—");
  });
  $("copyOut").addEventListener("click", ()=> {
    navigator.clipboard.writeText($("out").value || "—").catch(()=>{});
  });

  </script>
