<script>
   const $ = (id) => document.getElementById(id);
  function setTxt(id, v) { $(id).textContent = (v===undefined||v===null||v==="") ? "ã" : v; }
  function setVal(id, v) { $(id).value = v || ""; }

  function normalizeDomain(d){
    d = (d||"").trim().toLowerCase();
    d = d.replace(/^https:\/\//, "");
    d = d.replace(/\/.*$/, "");
    d = d.replace(/\.+$/,"");
    if (!d || !d.includes(".")) throw new Error("Domaine invalide.");
    return d;
  }

  function uniq(arr){ return Array.from(new Set(arr)); }

  async function dohQuery(name, type, cd=false){
    // cd=Checking Disabled. Ici on laisse cd=false (validation cûÇtûˋ rûˋsolveur si supportûˋe),
    // mais l'API JSON ne garantit pas toujours le comportement. On s'en sert surtout pour lire les RR.
    const url = "https://cloudflare-dns.com/dns-queryname=" + encodeURIComponent(name) +
      "&type=" + encodeURIComponent(type) + (cd ? "&cd=1" : "");
    const r = await fetch(url, { headers: { "accept": "application/dns-json" }, cache: "no-store" });
    if (!r.ok) throw new Error("DoH indisponible (" + r.status + ").");
    return await r.json();
  }

  function extractAnswerData(j, rrtype){
    const out = [];
    if (!j || !Array.isArray(j.Answer)) return out;
    for (const a of j.Answer){
      if (a && a.type === rrtype && a.data) out.push(String(a.data).trim());
    }
    return uniq(out);
  }

  function statusName(code){
    // RFC 1035: 0 NOERROR, 3 NXDOMAIN
    if (code === 0) return "NOERROR";
    if (code === 1) return "FORMERR";
    if (code === 2) return "SERVFAIL";
    if (code === 3) return "NXDOMAIN";
    if (code === 4) return "NOTIMP";
    if (code === 5) return "REFUSED";
    return String(code);
  }

  function parseDS(dsLine){
    // Format DS: "<keytag> <alg> <digestType> <digest>"
    const parts = dsLine.split(/\s+/);
    if (parts.length < 4) return null;
    return {
      keytag: parts[0],
      alg: parts[1],
      digestType: parts[2],
      digest: parts.slice(3).join("")
    };
  }

  function parseDNSKEY(line){
    // Format DNSKEY: "<flags> <proto> <alg> <publickey>"
    const parts = line.split(/\s+/);
    if (parts.length < 4) return null;
    const flags = Number(parts[0]);
    return {
      flags,
      proto: parts[1],
      alg: parts[2],
      key: parts.slice(3).join(""),
      isKSK: (flags & 257) === 257, // 257 = KSK
      isZSK: (flags & 256) === 256 && (flags & 1) === 0
    };
  }

  function section(lines, title){
    lines.push("");
    lines.push(title);
    lines.push("-".repeat(Math.min(40, title.length)));
  }

  async function run(){
    setTxt("status","Vûˋrification...");
    setTxt("note","Lecture DS/DNSKEY/RRSIG via DoH Cloudflare (diagnostic probable, pas une validation crypto complû´te).");
    setVal("out","");

    let domain;
    try{
      domain = normalizeDomain($("domain").value);
    }catch(e){
      setTxt("status","Erreur");
      setTxt("note", e.message || "Domaine invalide.");
      return;
    }

    try{
      // 1) DS au niveau parent (pour le domaine lui-mûˆme : DS est dans la zone parent)
      // En pratique, interroger DS sur le nom renvoie les DS (si publish).
      const dsJ = await dohQuery(domain, "DS");
      const ds = extractAnswerData(dsJ, 43); // DS=43
      const dsStatus = statusName(dsJ.Status);

      // 2) DNSKEY dans la zone enfant
      const keyJ = await dohQuery(domain, "DNSKEY");
      const dnskeys = extractAnswerData(keyJ, 48); // DNSKEY=48
      const keyStatus = statusName(keyJ.Status);

      // 3) RRSIG sur DNSKEY (si DNSSEC signûˋ)
      const sigJ = await dohQuery(domain, "RRSIG");
      const rrsig = extractAnswerData(sigJ, 46); // RRSIG=46
      const sigStatus = statusName(sigJ.Status);

      // 4) Un record "simple" (A) + RRSIG associûˋ (indice)
      const aJ = await dohQuery(domain, "A");
      const a = extractAnswerData(aJ, 1);
      const aStatus = statusName(aJ.Status);

      // On tente aussi RRSIG pour A via query RRSIG (ûÏa renvoie potentiellement plusieurs)
      // (Dûˋjû  rûˋcupûˋrûˋ avec sigJ, mais on le mentionne)

      const lines = [];
      lines.push("Vûˋrification DNSSEC");
      lines.push("===================");
      lines.push("");
      lines.push("Domaine: " + domain);

      section(lines, "Rûˋsumûˋ");
      // Diagnostic simple :
      // - DS prûˋsent + DNSKEY prûˋsent + RRSIG prûˋsent => trû´s probablement DNSSEC actif
      // - DS absent mais DNSKEY/RRSIG prûˋsent => zone signûˋe mais pas chain of trust (pas activûˋ au registrar)
      // - DS prûˋsent mais DNSKEY absent => configuration cassûˋe (risque SERVFAIL sur validateurs)
      // - rien => pas de DNSSEC
      let verdict = "Indûˋterminûˋ";
      let advice = [];

      const hasDS = ds.length > 0;
      const hasDNSKEY = dnskeys.length > 0;
      const hasRRSIG = rrsig.length > 0;

      if (hasDS && hasDNSKEY && hasRRSIG){
        verdict = "DNSSEC actif (probable) ";
        advice.push("ChaûÛne de confiance probable : DS + DNSKEY + RRSIG prûˋsents.");
      } else if (!hasDS && hasDNSKEY && hasRRSIG){
        verdict = "Zone signûˋe mais non chaûÛnûˋe (DS absent) - ? vûˋrifier";
        advice.push("Tu as probablement signûˋ la zone, mais le DS n'est pas publiûˋ au registrar/registre.");
      } else if (hasDS && !hasDNSKEY){
        verdict = "DNSSEC cassûˋ (DS prûˋsent mais DNSKEY absent) ";
        advice.push("Risque de SERVFAIL chez les rûˋsolveurs validateurs : vûˋrifier DNSKEY/zone signûˋe.");
      } else if (!hasDS && !hasDNSKEY && !hasRRSIG){
        verdict = "DNSSEC non dûˋtectûˋ ";
        advice.push("Aucun DS/DNSKEY/RRSIG observ?.");
      } else {
        verdict = "DNSSEC partiel / ? investiguer";
        advice.push("Prûˋsence partielle d'ûˋlûˋments DNSSEC. Vûˋrifier DS/DNSKEY et signatures.");
      }

      lines.push("Verdict: " + verdict);
      lines.push("DoH Status: DS=" + dsStatus + " / DNSKEY=" + keyStatus + " / RRSIG=" + sigStatus + " / A=" + aStatus);
      advice.forEach(a => lines.push("- " + a));

      section(lines, "DS (zone parent)");
      if (ds.length){
        ds.forEach((d, i) => {
          const p = parseDS(d);
          if (p){
            lines.push(`#${i+1}: keytag=${p.keytag} alg=${p.alg} digestType=${p.digestType}`);
            lines.push("    digest=" + p.digest);
          } else {
            lines.push("- " + d);
          }
        });
      } else {
        lines.push("(aucun DS trouvûˋ)");
      }

      section(lines, "DNSKEY (zone enfant)");
      if (dnskeys.length){
        dnskeys.forEach((k, i) => {
          const p = parseDNSKEY(k);
          if (p){
            const role = p.isKSK ? "KSK" : (p.isZSK  "ZSK" : "KEY");
            lines.push(`#${i+1}: flags=${p.flags} (${role}) alg=${p.alg} proto=${p.proto} key.len=${p.key.length}`);
          } else {
            lines.push("- " + k);
          }
        });
      } else {
        lines.push("(aucun DNSKEY trouvûˋ)");
      }

      section(lines, "RRSIG (signatures)");
      if (rrsig.length){
        // On ne parse pas tout (format long), on affiche un aperûÏu
        rrsig.slice(0, 12).forEach((s, i) => lines.push(`#${i+1}: ` + s));
        if (rrsig.length > 12) lines.push("... (" + (rrsig.length - 12) + " autres)");
      } else {
        lines.push("(aucun RRSIG trouvûˋ)");
      }

      section(lines, "A (vûˋrif rapide)");
      if (a.length){
        a.forEach(x => lines.push("- " + x));
      } else {
        lines.push("(pas de A ou non lisible)");
      }

      section(lines, "Commandes utiles (validation complû´te)");
      lines.push("dig +dnssec " + domain + " DNSKEY");
      lines.push("dig +dnssec " + domain + " DS");
      lines.push("delv " + domain + " A");
      lines.push("delv +vtrace " + domain + " A");

      setVal("out", lines.join("\n"));
      setTxt("status","OK");
      setTxt("note","Terminûˋ.");
    }catch(e){
      setTxt("status","Erreur");
      setTxt("note", (e && e.message) ? e.message : "Impossible de lire DNS via DoH.");
    }
  }

  $("btnCheck").addEventListener("click", run);

  $("btnClear").addEventListener("click", () => {
    setVal("domain","");
    setVal("out","");
    setTxt("status","ã");
    setTxt("note","ã");
  });

  $("copyOut").addEventListener("click", ()=> {
    navigator.clipboard.writeText($("out").value || "ã").catch(()=>{});
  });
  </script>
